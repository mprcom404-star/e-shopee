{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Notifications</h2>

{% if notes %}

<div class="list-group">

{% for n in notes %}

<div class="list-group-item">

{{ n.message }}

</div>

{% endfor %}

</div>

{% else %}

<p>No notifications yet.</p>

{% endif %}

{% endblock %}
