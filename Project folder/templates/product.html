{% extends "base.html" %}
{% block content %}

<h2>{{item.name}}</h2>

<img src="{{ url_for('static', filename='uploads/' + item.image) }}" width="250">

<p>{{item.description}}</p>

<h4>₹{{item.price}}</h4>

<p>Average Rating: {{avg}}</p>

<a href="/wishlist/{{item.id}}" class="btn btn-danger">Wishlist</a>

<a href="/add-cart/{{item.id}}" class="btn btn-success">Add to Cart</a>
<a href="/cart" class="btn btn-success">
Checkout
</a>

<a href="/checkout/{{item.id}}" class="btn btn-primary">Buy Now</a>

<form method="POST" action="/rate/{{item.id}}" class="mt-3">

<select name="rating">

<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>

</select>

<button class="btn btn-warning btn-sm">Rate</button>

</form>

{% endblock %}
